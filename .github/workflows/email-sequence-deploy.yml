name: Email Sequence Deploy

# Deploys an approved email nurture sequence to Systeme.io.
# Trigger: manual dispatch, run after approving a sequence in the
# dashboard HITL queue.

on:
  workflow_dispatch:
    inputs:
      product_id:
        description: "Product ID whose approved sequence should deploy (see config/products.yaml)"
        required: true
        type: string
      sequence_id:
        description: "email_sequences.id to deploy (optional — defaults to latest approved for product_id)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy-sequence:
    name: Push approved sequence to Systeme.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy sequence to Systeme.io
        id: deploy
        env:
          SYSTEME_IO_API_KEY: ${{ secrets.SYSTEME_IO_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PRODUCT_ID: ${{ inputs.product_id }}
          SEQUENCE_ID: ${{ inputs.sequence_id }}
        run: |
          python -m leads.integrations.systeme_io deploy-sequence \
            --product-id "$PRODUCT_ID" \
            ${SEQUENCE_ID:+--sequence-id "$SEQUENCE_ID"}

      - name: Confirm deployment back to dashboard
        if: success()
        run: |
          curl -sf -X POST "${{ secrets.DASHBOARD_WEBHOOK_URL }}/events" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DASHBOARD_WEBHOOK_TOKEN }}" \
            -d "{
              \"event\": \"email_sequence_deployed\",
              \"product_id\": \"${{ inputs.product_id }}\",
              \"sequence_id\": \"${{ inputs.sequence_id }}\",
              \"actor\": \"${{ github.actor }}\"
            }"

      - name: Notify dashboard on failure
        if: failure()
        run: |
          curl -sf -X POST "${{ secrets.DASHBOARD_WEBHOOK_URL }}/events" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DASHBOARD_WEBHOOK_TOKEN }}" \
            -d "{
              \"event\": \"email_sequence_deploy_failed\",
              \"product_id\": \"${{ inputs.product_id }}\",
              \"sequence_id\": \"${{ inputs.sequence_id }}\"
            }"
